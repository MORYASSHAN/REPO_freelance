<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Education Platform | Exam Predictor</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-obsidian: #02040a;
            --bg-surface: #0a0c10;
            --accent-lime: #00f400;
            --accent-lime-glow: rgba(0, 244, 0, 0.4);
            --accent-violet: #8a2be2;
            --accent-violet-glow: rgba(138, 43, 226, 0.4);
            --text-ivory: #ffffff;
            --text-dim: #64748b;
            --border-glow: #1e293b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.25s ease;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-obsidian);
            background-image: 
                linear-gradient(rgba(0, 244, 0, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 244, 0, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            color: var(--text-ivory);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: var(--bg-surface);
            border: 1px solid var(--accent-lime);
            border-radius: 4px;
            padding: 50px;
            width: 100%;
            max-width: 500px;
            position: relative;
            box-shadow: 0 0 30px rgba(0, 244, 0, 0.05);
            animation: fIn 0.6s ease-out;
        }

        .container::before {
            content: "MODULE: EXAM_PREDICTOR";
            position: absolute;
            top: -12px;
            left: 20px;
            background: var(--bg-obsidian);
            padding: 0 10px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.75rem;
            color: var(--accent-lime);
        }

        h1 {
            font-family: 'Share Tech Mono', monospace;
            font-size: 2rem;
            text-align: center;
            margin-bottom: 10px;
            text-transform: uppercase;
            color: var(--accent-lime);
            text-shadow: 0 0 10px var(--accent-lime-glow);
        }

        p.description {
            text-align: center;
            color: var(--text-dim);
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.8rem;
            margin-bottom: 40px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.85rem;
            color: var(--accent-violet);
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-glow);
            border-radius: 4px;
            color: var(--text-ivory);
            font-family: 'Share Tech Mono', monospace;
            font-size: 1rem;
            outline: none;
        }

        input:focus {
            border-color: var(--accent-lime);
            background: rgba(0, 244, 0, 0.03);
            box-shadow: 0 0 15px rgba(0, 244, 0, 0.1);
        }

        button {
            width: 100%;
            padding: 16px;
            background: var(--accent-lime);
            border: none;
            border-radius: 4px;
            color: var(--bg-obsidian);
            font-family: 'Share Tech Mono', monospace;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 20px;
            box-shadow: 0 0 20px var(--accent-lime-glow);
        }

        button:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 30px;
            color: var(--text-dim);
            text-decoration: none;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .back-link:hover {
            color: var(--accent-lime);
        }

        .credits {
            margin-top: 45px;
            text-align: center;
            border-top: 1px solid var(--border-glow);
            padding-top: 25px;
        }

        .credits b {
            font-family: 'Share Tech Mono', monospace;
            color: var(--accent-violet);
            font-size: 1rem;
            display: block;
        }

        .credits span {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-top: 4px;
            display: block;
        }

        @keyframes fIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Exam Predictor</h1>
        <p class="description">Predict Your Score</p>
        
        <form method="POST">
            <div class="form-group">
                <label>Study Time (Hours):</label>
                <input type="number" step="any" name="study_hours" placeholder="0.0" required>
            </div>
            <div class="form-group">
                <label>Attendance Rate (%):</label>
                <input type="number" step="any" name="attendance" placeholder="0" required>
            </div>
            <div class="form-group">
                <label>Past Performance (Marks):</label>
                <input type="number" step="any" name="past_scores" placeholder="0" required>
            </div>
            <button type="submit">Predict Score</button>
        </form>

        <div class="credits">
            <b>Taha Bohra</b>
            <span>Researcher | I26040241</span>
        </div>

        <a href="/" class="back-link">Back to Dashboard</a>
    </div>
</body>
</html>
