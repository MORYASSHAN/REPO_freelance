<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduPlat ML | Forecaster</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #050812;
            --bg-surface: #0a0f1e;
            --primary: #22d3ee;
            --primary-glow: rgba(34, 211, 238, 0.4);
            --secondary: #3b82f6;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border-clr: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-deep);
            background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 30px 30px;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: var(--bg-surface);
            border: 1px solid var(--border-clr);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.6s ease-out;
            position: relative;
        }

        .container::before {
            content: "ID: FORECASTER_NODE_01";
            position: absolute;
            top: 15px;
            right: 20px;
            font-family: 'Space Mono', monospace;
            font-size: 0.65rem;
            color: var(--primary);
            opacity: 0.5;
        }

        h1 {
            font-family: 'Space Mono', monospace;
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-align: center;
            text-transform: uppercase;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.description {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 35px;
            font-size: 0.9rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        form label {
            display: block;
            margin-bottom: 8px;
            font-family: 'Space Mono', monospace;
            font-size: 0.8rem;
            color: var(--primary);
            text-transform: uppercase;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-clr);
            border-radius: 10px;
            padding: 14px 18px;
            color: white;
            font-family: 'Space Mono', monospace;
            font-size: 0.95rem;
            margin-bottom: 25px;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
            background: rgba(34, 211, 238, 0.05);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        button {
            width: 100%;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            color: #050812;
            border: none;
            padding: 16px;
            border-radius: 10px;
            font-family: 'Space Mono', monospace;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px var(--primary-glow);
            filter: brightness(1.1);
        }

        .back {
            margin-top: 30px;
            text-align: center;
        }

        .back a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .back a:hover {
            color: var(--primary);
        }

        .credits {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid var(--border-clr);
            text-align: center;
        }

        .credits b {
            font-family: 'Space Mono', monospace;
            font-size: 0.9rem;
            color: var(--primary);
        }

        .credits p {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-top: 4px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Forecaster</h1>
        <p class="description">Non-Linear Prediction Engine</p>

        <form method="POST">
            <label for="study_hours">Vector: Study_Metrics</label>
            <input type="number" step="any" name="study_hours" id="study_hours" placeholder="Intensity (Hours)" required anonymous>

            <label for="attendance">Vector: Presence_Ratio (%)</label>
            <input type="number" step="any" name="attendance" id="attendance" placeholder="Confidence (0-100)" required>

            <label for="past_scores">Vector: Historical_Data</label>
            <input type="number" step="any" name="past_scores" id="past_scores" placeholder="Avg Mean Score" required>

            <button type="submit">Compute Projection</button>
        </form>

        <div class="credits">
            <b>burhanuddin bohra</b>
            <p>Architect | I26040211</p>
        </div>

        <div class="back">
            <a href="/">← Return to Core</a>
        </div>
    </div>
</body>
</html>
