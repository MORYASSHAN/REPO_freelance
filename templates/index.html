<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduPlat ML | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #050812;
            --bg-surface: #0a0f1e;
            --primary: #22d3ee;
            --primary-glow: rgba(34, 211, 238, 0.4);
            --secondary: #3b82f6;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border-clr: rgba(255, 255, 255, 0.08);
            --card-hover: rgba(34, 211, 238, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-deep);
            background-image: 
                radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 40px 40px;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeIn 1s ease-out;
        }

        h1 {
            font-family: 'Space Mono', monospace;
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: -2px;
            text-transform: uppercase;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            position: relative;
        }

        h1::after {
            content: 'ML_ENGINE_V2.0';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.8rem;
            letter-spacing: 4px;
            color: var(--primary);
            opacity: 0.6;
        }

        p.subtitle {
            margin-top: 25px;
            font-size: 1rem;
            color: var(--text-muted);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .module-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            width: 100%;
            max-width: 1100px;
            animation: slideUp 0.8s ease-out both;
        }

        .module-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-clr);
            border-radius: 16px;
            padding: 40px 30px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .module-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .module-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            background: var(--card-hover);
            box-shadow: 0 10px 40px var(--primary-glow);
        }

        .module-card:hover::before {
            opacity: 1;
        }

        .module-card i {
            font-size: 3rem;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px var(--primary-glow));
        }

        .module-card span {
            font-family: 'Space Mono', monospace;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-main);
            text-transform: uppercase;
        }

        .footer-box {
            margin-top: 80px;
            text-align: center;
        }

        .credits {
            border-left: 2px solid var(--primary);
            padding: 10px 25px;
            background: rgba(255,255,255,0.02);
        }

        .credits p {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .credits b {
            font-family: 'Space Mono', monospace;
            font-size: 1.1rem;
            color: var(--primary);
            display: block;
        }

        .credits .id-tag {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 5px;
        }

        @keyframes fadeIn {
            from { opacity: 0; filter: blur(10px); }
            to { opacity: 1; filter: blur(0); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            .module-list { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header>
        <h1>EduPlat ML</h1>
        <p class="subtitle">Neural-Enhanced Learning Architecture</p>
    </header>

    <div class="module-list">
        <a href="/exam-predictor" class="module-card">
            <i>📊</i>
            <span>Forecaster</span>
        </a>
        <a href="/smart-tutor" class="module-card">
            <i>🧠</i>
            <span>Cogno-Tutor</span>
        </a>
        <a href="/essay-grader" class="module-card">
            <i>✍️</i>
            <span>NLP-Grader</span>
        </a>
        <a href="/attendance" class="module-card">
            <i>📅</i>
            <span>Data Logs</span>
        </a>
        <a href="/qa-bot" class="module-card">
            <i>🤖</i>
            <span>Neural-QA</span>
        </a>
    </div>

    <div class="footer-box">
        <div class="credits">
            <p>System Architect</p>
            <b>burhanuddin bohra</b>
            <div class="id-tag">I26040211</div>
        </div>
    </div>
</body>
</html>
