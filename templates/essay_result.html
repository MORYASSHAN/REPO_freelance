<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Education Platform | Essay Report</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-obsidian: #02040a;
            --bg-surface: #0a0c10;
            --accent-lime: #00f400;
            --accent-lime-glow: rgba(0, 244, 0, 0.4);
            --accent-violet: #8a2be2;
            --accent-violet-glow: rgba(138, 43, 226, 0.4);
            --text-ivory: #ffffff;
            --text-dim: #64748b;
            --border-glow: #1e293b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.25s ease;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-obsidian);
            background-image: 
                linear-gradient(rgba(0, 244, 0, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 244, 0, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            color: var(--text-ivory);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: var(--bg-surface);
            border: 1px solid var(--accent-lime);
            border-radius: 4px;
            padding: 50px;
            width: 100%;
            max-width: 650px;
            position: relative;
            box-shadow: 0 0 30px rgba(0, 244, 0, 0.05);
            animation: fIn 0.8s ease-out;
        }

        .container::before {
            content: "ID: ESSAY_REPORT";
            position: absolute;
            top: -12px;
            left: 20px;
            background: var(--bg-obsidian);
            padding: 0 10px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.75rem;
            color: var(--accent-lime);
        }

        h1 {
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.1rem;
            color: var(--text-dim);
            margin-bottom: 40px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .report-grid {
            border: 1px solid var(--border-glow);
            border-radius: 4px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.01);
        }

        .stat-group {
            margin-bottom: 30px;
        }

        .stat-label {
            display: block;
            color: var(--accent-lime);
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.8rem;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-ivory);
        }

        .grade {
            font-family: 'Share Tech Mono', monospace;
            font-size: 4rem;
            color: var(--accent-violet);
            text-shadow: 0 0 20px var(--accent-violet-glow);
            line-height: 1;
        }

        .feedback {
            background: rgba(0, 0, 0, 0.4);
            padding: 20px;
            border-left: 2px solid var(--accent-lime);
            color: var(--text-dim);
            font-style: italic;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-top: 10px;
        }

        .nav-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 40px;
        }

        .nav-actions a {
            text-decoration: none;
            color: var(--text-ivory);
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.85rem;
            padding: 14px 28px;
            border-radius: 4px;
            border: 1px solid var(--border-glow);
            background: rgba(255, 255, 255, 0.02);
            text-transform: uppercase;
        }

        .nav-actions a:hover {
            border-color: var(--accent-lime);
            background: rgba(0, 244, 0, 0.03);
            color: var(--accent-lime);
            transform: translateY(-2px);
        }

        .nav-actions a.primary {
            background: var(--accent-lime);
            color: var(--bg-obsidian);
            border: none;
            font-weight: 700;
            box-shadow: 0 0 20px var(--accent-lime-glow);
        }

        .credits {
            margin-top: 50px;
            text-align: center;
            border-top: 1px solid var(--border-glow);
            padding-top: 30px;
        }

        .credits b {
            font-family: 'Share Tech Mono', monospace;
            color: var(--accent-lime);
            font-size: 1.1rem;
            display: block;
        }

        .credits span {
            font-size: 0.8rem;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-top: 6px;
            display: block;
        }

        @keyframes fIn {
            from { opacity: 0; transform: translateX(-15px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Essay Report</h1>
        
        <div class="report-grid">
            <div class="stat-group">
                <span class="stat-label">Word Count</span>
                <span class="stat-value">{{ word_count }} words</span>
            </div>
            
            <div class="stat-group">
                <span class="stat-label">Overall Grade</span>
                <span class="grade">{{ grade }}</span>
            </div>
            
            <div class="stat-group" style="margin-bottom: 0;">
                <span class="stat-label">Feedback</span>
                <div class="feedback">
                    "{{ feedback }}"
                </div>
            </div>
        </div>

        <div class="credits">
            <b>Taha Bohra</b>
            <span>Researcher | I26040241</span>
        </div>

        <div class="nav-actions">
            <a href="/essay-grader" class="primary">Try Again</a>
            <a href="/">Dashboard</a>
        </div>
    </div>
</body>
</html>
