<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduPlat | Essay Results</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ec4899;
            --secondary: #db2777;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #450a0a 100%);
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.8s ease-out;
        }

        h1 {
            font-size: 1.5rem;
            color: var(--text-muted);
            margin-bottom: 30px;
            font-weight: 400;
            text-align: center;
        }

        .result-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid var(--glass-border);
        }

        .stat-item {
            margin-bottom: 20px;
        }

        .stat-label {
            display: block;
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .grade-value {
            font-size: 2.2rem;
            background: linear-gradient(to right, #f472b6, #ec4899);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .feedback-box {
            background: rgba(0, 0, 0, 0.2);
            padding: 20px;
            border-radius: 12px;
            margin-top: 15px;
            font-style: italic;
            color: var(--text-muted);
            border-left: 4px solid var(--primary);
        }

        .back {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .back a {
            text-decoration: none;
            color: var(--text-main);
            font-weight: 500;
            font-size: 0.95rem;
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.05);
        }

        .back a:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .back a.primary {
            background: var(--primary);
            border-color: var(--primary);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Essay Evaluation</h1>
        
        <div class="result-card">
            <div class="stat-item">
                <span class="stat-label">Word Count</span>
                <span class="stat-value">{{ word_count }} words</span>
            </div>
            
            <div class="stat-item">
                <span class="stat-label">Overall Grade</span>
                <span class="grade-value">{{ grade }}</span>
            </div>
            
            <div class="stat-item" style="margin-bottom: 0;">
                <span class="stat-label">feedback & analysis</span>
                <div class="feedback-box">
                    "{{ feedback }}"
                </div>
            </div>
        </div>

        <div class="back">
            <a href="/essay-grader" class="primary">Grade another essay</a>
            <a href="/">Dashboard</a>
        </div>
    </div>
</body>
</html>
