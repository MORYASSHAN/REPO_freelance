<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Education Platform | Success</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-obsidian: #02040a;
            --bg-surface: #0a0c10;
            --accent-lime: #00f400;
            --accent-lime-glow: rgba(0, 244, 0, 0.4);
            --accent-violet: #8a2be2;
            --accent-violet-glow: rgba(138, 43, 226, 0.4);
            --text-ivory: #ffffff;
            --text-dim: #64748b;
            --border-glow: #1e293b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.25s ease;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-obsidian);
            background-image: 
                linear-gradient(rgba(0, 244, 0, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 244, 0, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            color: var(--text-ivory);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }

        .container {
            background: var(--bg-surface);
            border: 1px solid var(--accent-lime);
            border-radius: 4px;
            padding: 60px 40px;
            width: 100%;
            max-width: 500px;
            position: relative;
            box-shadow: 0 0 40px rgba(0, 244, 0, 0.05);
            animation: pIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .container::before {
            content: "EVENT: SUCCESS";
            position: absolute;
            top: -12px;
            left: 20px;
            background: var(--bg-obsidian);
            padding: 0 10px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.75rem;
            color: var(--accent-lime);
        }

        .status-icon {
            font-size: 5rem;
            margin-bottom: 30px;
            display: block;
            filter: drop-shadow(0 0 20px var(--accent-lime-glow));
        }

        .msg-primary {
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--accent-lime);
            text-transform: uppercase;
        }

        .msg-secondary {
            color: var(--text-dim);
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9rem;
            margin-bottom: 50px;
            line-height: 1.6;
            letter-spacing: 1px;
        }

        .btn-root {
            display: inline-block;
            text-decoration: none;
            color: var(--bg-obsidian);
            font-family: 'Share Tech Mono', monospace;
            font-weight: 700;
            padding: 16px 40px;
            border-radius: 4px;
            background: var(--accent-violet);
            color: white;
            box-shadow: 0 0 20px var(--accent-violet-glow);
            text-transform: uppercase;
        }

        .btn-root:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
            box-shadow: 0 0 30px var(--accent-violet-glow);
        }

        .credits {
            margin-top: 60px;
            padding-top: 30px;
            border-top: 1px solid var(--border-glow);
        }

        .credits b {
            font-family: 'Share Tech Mono', monospace;
            color: var(--accent-lime);
            font-size: 1.1rem;
            display: block;
        }

        .credits span {
            font-size: 0.8rem;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-top: 6px;
            display: block;
        }

        @keyframes pIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="status-icon">⚡</span>
        <div class="msg-primary">
        Success
        </div>
        <div class="msg-secondary">
            Your question has been received. Our tutor will provide the answer shortly.
        </div>

        <div class="credits">
            <b>Taha Bohra</b>
            <span>Researcher | I26040241</span>
        </div>

        <div style="margin-top: 45px;">
            <a href="/" class="btn-root">Back to Dashboard</a>
        </div>
    </div>
</body>
</html>
