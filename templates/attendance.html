<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduPlat | Mark Attendance</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0d9488;
            --secondary: #0f766e;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #064e3b 100%);
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.8s ease-out;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 30px;
            text-align: center;
            background: linear-gradient(to right, #2dd4bf, #0d9488);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        form label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input, select {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px 15px;
            color: white;
            font-size: 1rem;
            margin-bottom: 20px;
            outline: none;
            cursor: pointer;
        }

        option {
            background: #0f172a;
            color: white;
        }

        input:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(13, 148, 136, 0.15);
        }

        button {
            width: 100%;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(13, 148, 136, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(13, 148, 136, 0.4);
            filter: brightness(1.1);
        }

        .links {
            margin-top: 30px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
        }

        .links a:hover {
            color: var(--text-main);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Mark Attendance</h1>

        <form method="POST">
            <label for="roll_no">Roll Number</label>
            <input type="text" name="roll_no" id="roll_no" placeholder="e.g. 101" required>

            <label for="student_name">Student Name</label>
            <input type="text" name="student_name" id="student_name" placeholder="e.g. John Doe" required>

            <label for="slot">Select Slot</label>
            <select name="slot" id="slot">
                <option>Morning</option>
                <option>Afternoon</option>
                <option>Evening</option>
            </select>

            <label for="status">Attendance Status</label>
            <select name="status" id="status">
                <option>Present</option>
                <option>Absent</option>
            </select>

            <button type="submit">Submit Record</button>
        </form>

        <div class="links">
            <a href="/attendance/view">View Attendance Log</a>
            <a href="/">← Back to Dashboard</a>
        </div>
    </div>
</body>
</html>
