<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Education Platform | Attendance</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-obsidian: #02040a;
            --bg-surface: #0a0c10;
            --accent-lime: #00f400;
            --accent-lime-glow: rgba(0, 244, 0, 0.4);
            --accent-violet: #8a2be2;
            --accent-violet-glow: rgba(138, 43, 226, 0.4);
            --text-ivory: #ffffff;
            --text-dim: #64748b;
            --border-glow: #1e293b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.25s ease;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-obsidian);
            background-image: 
                linear-gradient(rgba(0, 244, 0, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 244, 0, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            color: var(--text-ivory);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: var(--bg-surface);
            border: 1px solid var(--accent-lime);
            border-radius: 4px;
            padding: 50px;
            width: 100%;
            max-width: 500px;
            position: relative;
            box-shadow: 0 0 30px rgba(0, 244, 0, 0.05);
            animation: fIn 0.6s ease-out;
        }

        .container::before {
            content: "MODULE: ATTENDANCE_LOGGER";
            position: absolute;
            top: -12px;
            left: 20px;
            background: var(--bg-obsidian);
            padding: 0 10px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.75rem;
            color: var(--accent-lime);
        }

        h1 {
            font-family: 'Share Tech Mono', monospace;
            font-size: 2rem;
            text-align: center;
            margin-bottom: 30px;
            text-transform: uppercase;
            color: var(--accent-lime);
            text-shadow: 0 0 10px var(--accent-lime-glow);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.8rem;
            color: var(--accent-violet);
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-glow);
            border-radius: 4px;
            color: var(--text-ivory);
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.95rem;
            outline: none;
        }

        select option {
            background: var(--bg-surface);
            color: var(--text-ivory);
        }

        input:focus, select:focus {
            border-color: var(--accent-lime);
            background: rgba(0, 244, 0, 0.03);
            box-shadow: 0 0 15px rgba(0, 244, 0, 0.1);
        }

        button {
            width: 100%;
            padding: 16px;
            background: var(--accent-lime);
            border: none;
            border-radius: 4px;
            color: var(--bg-obsidian);
            font-family: 'Share Tech Mono', monospace;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 15px;
            box-shadow: 0 0 20px var(--accent-lime-glow);
        }

        button:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
        }

        .links {
            margin-top: 35px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .links a {
            color: var(--text-dim);
            text-decoration: none;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .links a:hover {
            color: var(--accent-lime);
        }

        .credits {
            margin-top: 45px;
            text-align: center;
            border-top: 1px solid var(--border-glow);
            padding-top: 25px;
        }

        .credits b {
            font-family: 'Share Tech Mono', monospace;
            color: var(--accent-violet);
            font-size: 1rem;
            display: block;
        }

        .credits span {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-top: 4px;
            display: block;
        }

        @keyframes fIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Attendance Record</h1>

        <form method="POST">
            <div class="form-group">
                <label>Roll Number:</label>
                <input type="text" name="roll_no" placeholder="Enter Roll Number" required>
            </div>

            <div class="form-group">
                <label>Student Name:</label>
                <input type="text" name="student_name" placeholder="Enter Full Name" required>
            </div>

            <div class="form-group">
                <label>Select Session:</label>
                <select name="slot">
                    <option>Morning</option>
                    <option>Afternoon</option>
                    <option>Evening</option>
                </select>
            </div>

            <div class="form-group">
                <label>Attendance Status:</label>
                <select name="status">
                    <option>Present</option>
                    <option>Absent</option>
                </select>
            </div>

            <button type="submit">Submit Attendance</button>
        </form>

        <div class="credits">
            <b>Taha Bohra</b>
            <span>Researcher | I26040241</span>
        </div>

        <div class="links">
            <a href="/attendance/view">View Attendance Logs</a>
            <a href="/" style="color: var(--accent-lime)">← Back to Dashboard</a>
        </div>
    </div>
</body>
</html>
