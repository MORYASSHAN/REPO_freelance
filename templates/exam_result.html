<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Education Platform | Prediction Result</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-obsidian: #02040a;
            --bg-surface: #0a0c10;
            --accent-lime: #00f400;
            --accent-lime-glow: rgba(0, 244, 0, 0.4);
            --accent-violet: #8a2be2;
            --accent-violet-glow: rgba(138, 43, 226, 0.4);
            --text-ivory: #ffffff;
            --text-dim: #64748b;
            --border-glow: #1e293b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.25s ease;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-obsidian);
            background-image: 
                linear-gradient(rgba(0, 244, 0, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 244, 0, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            color: var(--text-ivory);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: var(--bg-surface);
            border: 1px solid var(--accent-lime);
            border-radius: 4px;
            padding: 50px;
            width: 100%;
            max-width: 480px;
            text-align: center;
            position: relative;
            box-shadow: 0 0 30px rgba(0, 244, 0, 0.05);
            animation: fIn 0.6s ease-out;
        }

        .container::before {
            content: "RESULT: PREDICTION_LOG";
            position: absolute;
            top: -12px;
            left: 20px;
            background: var(--bg-obsidian);
            padding: 0 10px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.75rem;
            color: var(--accent-lime);
        }

        h1 {
            font-family: 'Share Tech Mono', monospace;
            font-size: 1rem;
            color: var(--text-dim);
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .result-wrapper {
            margin: 40px 0;
            position: relative;
        }

        .result {
            font-family: 'Share Tech Mono', monospace;
            font-size: 5rem;
            font-weight: 700;
            color: var(--accent-lime);
            text-shadow: 0 0 20px var(--accent-lime-glow);
            line-height: 1;
        }

        .unit {
            font-size: 1.5rem;
            color: var(--text-dim);
            vertical-align: middle;
            margin-left: 5px;
        }

        .status-msg {
            color: var(--accent-violet);
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.85rem;
            text-transform: uppercase;
            margin-top: 20px;
            letter-spacing: 1px;
        }

        .back-nav {
            margin-top: 50px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .back-nav a {
            text-decoration: none;
            color: var(--text-ivory);
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.85rem;
            padding: 12px 24px;
            border-radius: 4px;
            border: 1px solid var(--border-glow);
            background: rgba(255, 255, 255, 0.02);
            text-transform: uppercase;
        }

        .back-nav a:hover {
            border-color: var(--accent-lime);
            color: var(--accent-lime);
            background: rgba(0, 244, 0, 0.03);
            transform: translateY(-2px);
        }

        .back-nav a.highlight {
            background: var(--accent-violet);
            border: none;
            box-shadow: 0 0 15px var(--accent-violet-glow);
        }

        .back-nav a.highlight:hover {
            color: white;
            filter: brightness(1.1);
        }

        .credits {
            margin-top: 50px;
            padding-top: 25px;
            border-top: 1px solid var(--border-glow);
        }

        .credits b {
            font-family: 'Share Tech Mono', monospace;
            color: var(--accent-lime);
            font-size: 1rem;
            display: block;
        }

        .credits span {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-top: 5px;
            display: block;
        }

        @keyframes fIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Predicted Score</h1>
        <div class="result-wrapper">
            <div class="result">
                {{ predicted }}<span class="unit">.00%</span>
            </div>
            <p class="status-msg">Analysis Complete</p>
        </div>
        
        <div class="credits">
            <b>Taha Bohra</b>
            <span>Researcher | I26040241</span>
        </div>

        <div class="back-nav">
            <a href="/exam-predictor" class="highlight">Try Again</a>
            <a href="/">Dashboard</a>
        </div>
    </div>
</body>
</html>
