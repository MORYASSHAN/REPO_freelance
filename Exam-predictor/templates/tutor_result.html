<!DOCTYPE html>
<html>
<head>
    <title>Tutor Result</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style_aaru.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="tutor">
    <div class="container">
        <h2><i class="fas fa-microchip"></i> QUERY_RESPONSE / DATA</h2>

            <p><strong>[INPUT]:</strong> {{ question }}</p>
            <p><strong>[OUTPUT]:</strong> {{ answer }}</p>
            <p style="color: var(--neon-cyan); margin-top: 15px;">>> [SUGGESTION]: {{ tip }}</p>
        </div>

        <a href="/tutor" class="btn-back" style="color: var(--neon-cyan);"><i class="fas fa-redo"></i> NEW_QUERY</a>
        <br>
        <a href="/" class="btn-back"><i class="fas fa-arrow-left"></i> RETURN_TO_CORE</a>

        <div class="attribution-box">
            <span class="attribution-name">Mithil Panchal</span>
            <span class="attribution-id">I26040187</span>
        </div>
    </div>

</body>
</html>
