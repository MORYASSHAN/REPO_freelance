<!DOCTYPE html>
<html>
<head>
    <title>Tutor Result</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style_aaru.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="tutor">
    <div class="container">
        <h2>Tutor Response</h2>
        <div class="result-box">
            <p style="color: var(--text-secondary); margin-bottom: 10px;"><strong>Question:</strong> {{ question }}</p>
            <p><strong>Answer:</strong> {{ answer }}</p>
            <div style="margin-top: 20px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); color: var(--secondary);">
                <i class="fas fa-lightbulb"></i> <strong>Pro Tip:</strong> {{ tip }}
            </div>
        </div>

        <a href="/tutor" class="btn-back" style="color: var(--primary);"><i class="fas fa-redo"></i> Ask Another Question</a>
        <br>
        <a href="/" class="btn-back"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>

        <div class="attribution-box">
            <span class="attribution-name">Burhanuddin Bohra</span>
            <span class="attribution-id">I26040211</span>
        </div>
    </div>


</body>
</html>
