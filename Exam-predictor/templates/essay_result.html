<!DOCTYPE html>
<html>
<head>
    <title>Essay Result</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style_aaru.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="essay">
    <div class="container">
        <h2>Grading Result</h2>
        <p>Here is the analysis of your essay.</p>
        <div class="result-box">
            <div style="font-size: 2.5rem; font-weight: 700; color: var(--primary);">{{ score }}%</div>
            <p style="margin-top: 10px;"><strong>Feedback:</strong> {{ feedback }}</p>
        </div>

        <a href="/essay" class="btn-back" style="color: var(--primary);"><i class="fas fa-edit"></i> Grade Another Essay</a>
        <br>
        <a href="/" class="btn-back"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>

        <div class="attribution-box">
            <span class="attribution-name">Burhanuddin Bohra</span>
            <span class="attribution-id">I26040211</span>
        </div>
    </div>


</body>
</html>
