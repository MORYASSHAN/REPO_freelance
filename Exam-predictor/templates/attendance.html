<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mark Attendance</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style_aaru.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="attendance">
    <div class="container">
        <h2>Attendance Tracker</h2>
        <p>Register student presence for academic records.</p>
        <form action="/attendance_log" method="POST">
            <div class="form-group">
                <label>Roll Number</label>
                <input type="text" name="roll_no" required placeholder="e.g. 101">
            </div>

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="student_name" required placeholder="Student Name">
            </div>

            <div class="form-group">
                <label>Session Slot</label>
                <select name="slot" required>
                    <option>Morning</option>
                    <option>Afternoon</option>
                    <option>Evening</option>
                    <option>Extra</option>
                </select>
            </div>

            <div class="form-group">
                <label>Status</label>
                <select name="status" required>
                    <option>Present</option>
                    <option>Absent</option>
                    <option>Not Available</option>
                </select>
            </div>

            <button type="submit" class="btn-gradient">Submit Attendance</button>
        </form>

        <div class="links" style="margin-top: 25px;">
            <a href="/attendance_log" class="btn-back" style="color: var(--secondary);"><i class="fas fa-list"></i> View Records</a>
            <br>
            <a href="/" class="btn-back"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
        </div>

        <div class="attribution-box">
            <span class="attribution-name">burhanuddin bohra</span>
            <span class="attribution-id">I26040211</span>
        </div>
    </div>


</body>
</html>
