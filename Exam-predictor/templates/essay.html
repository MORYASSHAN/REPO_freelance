<!DOCTYPE html>
<html>
<head>
    <title>Essay Grader</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style_aaru.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="essay">
    <div class="container">
        <h2>Essay Grader</h2>
        <p>Get instant feedback and scoring for your writing.</p>

        <form action="/grade_essay" method="POST">
            <div class="form-group">
                <textarea name="essay_text" rows="10" placeholder="Paste your essay here..." required></textarea>
            </div>
            <button type="submit" class="btn-gradient">Analyze Writing</button>
        </form>

        <a href="/" class="btn-back"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>

        <div class="attribution-box">
            <span class="attribution-name">burhanuddin bohra</span>
            <span class="attribution-id">I26040211</span>
        </div>
    </div>


</body>
</html>
