<!DOCTYPE html>
<html>
<head>
    <title>Exam Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style_aaru.css') }}">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="predictor">
    <div class="container">
        <h2>Score Predictor</h2>
        <p>Get a data-driven prediction of your upcoming exam results.</p>

        <form action="/predict" method="post">
            <div class="form-group">
                <label>Daily Study Hours</label>
                <input type="number" name="study_hours" step="0.1" required placeholder="e.g. 5.5">
            </div>

            <div class="form-group">
                <label>Attendance Percentage (%)</label>
                <input type="number" name="attendance" step="0.1" required placeholder="e.g. 85">
            </div>

            <div class="form-group">
                <label>Past Academic Score</label>
                <input type="number" name="past_scores" step="0.1" required placeholder="e.g. 78">
            </div>

            <br>
            <button type="submit" class="btn-gradient">Calculate Prediction</button>
        </form>

        <a href="/" class="btn-back"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>

        <div class="attribution-box">
            <span class="attribution-name">Mithil Panchal</span>
            <span class="attribution-id">I26040187</span>
        </div>
    </div>


</body>
</html>
