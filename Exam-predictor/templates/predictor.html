<!DOCTYPE html>
<html>
<head>
    <title>Exam Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style_aaru.css') }}">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="predictor">
    <div class="container">
        <h2><i class="fas fa-terminal"></i> EXAM_PREDICTOR / INPUT_DATA</h2>
        <p>Initialize prediction sequence by entering parameters.</p>

        <form action="/predict" method="post">
            <div class="form-group">
                <label><i class="fas fa-microchip"></i> STUDY_HOURS:</label>
                <input type="number" name="study_hours" step="0.1" required placeholder="0.0">
            </div>

            <div class="form-group">
                <label><i class="fas fa-signal"></i> ATTENDANCE_PCT:</label>
                <input type="number" name="attendance" step="0.1" required placeholder="0.0">
            </div>

            <div class="form-group">
                <label><i class="fas fa-history"></i> PAST_PERFORMANCE:</label>
                <input type="number" name="past_scores" step="0.1" required placeholder="0.0">
            </div>

            <br>
            <button type="submit" class="btn-gradient">EXEC_PREDICTION</button>
        </form>

        <a href="/" class="btn-back"><i class="fas fa-arrow-left"></i> RETURN_TO_CORE</a>

        <div class="attribution-box">
            <span class="attribution-label">SYSTEM_AUTHORIZED_BY:</span>
            <span class="attribution-name">Mithil Panchal</span>
            <span class="attribution-id">I26040187</span>
        </div>
    </div>


</body>
</html>
