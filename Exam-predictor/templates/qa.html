<!DOCTYPE html>
<html>
<head>
    <title>QA Bot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style_aaru.css') }}">
    <!-- Add Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="qa">
    <div class="container">
        <h2>Ask AI Anything</h2>
        <p>Get instant answers to your academic questions using artificial intelligence.</p>

        <form action="/qa_answer" method="POST">
            <div class="form-group">
                <input type="text" name="question" placeholder="Type your question here..." required>
            </div>
            <button type="submit" class="btn-gradient">Ask Assistant</button>
        </form>

        <a href="/" class="btn-back"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>

        <div class="attribution-box">
            <span class="attribution-name">Mithil Panchal</span>
            <span class="attribution-id">I26040187</span>
        </div>
    </div>


</body>
</html>
