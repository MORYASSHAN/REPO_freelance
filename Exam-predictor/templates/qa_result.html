<!DOCTYPE html>
<html>
<head>
    <title>QA Result</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style_aaru.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="qa">
    <div class="container">
        <h2>Consultation Result</h2>
        
        <!-- Thinking indicator -->
        <div id="thinking" style="color: var(--text-secondary); margin-bottom: 20px;">
            <i class="fas fa-circle-notch fa-spin"></i> Processing academic query...
        </div>

        <!-- Answer section (hidden initially) -->
        <div id="answer-section" style="display: none;">
            <div class="result-box">
                <p style="color: var(--text-secondary); margin-bottom: 15px;"><strong>Your Question:</strong> {{ question }}</p>
                <p><strong>AI Assistant:</strong> {{ answer }}</p>
            </div>

            <a href="/qa" class="btn-back" style="color: var(--primary);"><i class="fas fa-redo"></i> Ask Another Question</a>
            <br>
            <a href="/" class="btn-back"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
        </div>

        <div class="attribution-box">
            <span class="attribution-name">taha bohra</span>
            <span class="attribution-id">I26040241</span>
        </div>
    </div>



    <script>
        // Show answer after 1.5 seconds
        setTimeout(function() {
            document.getElementById('thinking').style.display = 'none';
            document.getElementById('answer-section').style.display = 'block';
        }, 1500);
    </script>
</body>
</html>
